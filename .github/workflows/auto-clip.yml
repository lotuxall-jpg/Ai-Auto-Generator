name: Auto Clip Generator

on:
  schedule:
    - cron: '0 */2 * * *'   # runs every 2 hours – adjust as you like
  workflow_dispatch:         # allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download background music (optional)
        run: |
          mkdir -p assets
          if [ ! -f assets/background_music.mp3 ]; then
            # Replace with a real royalty-free URL or skip this step
            echo "No background music found; continuing without music."
          fi
        continue-on-error: true

      - name: Run clip generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
        run: python main.py

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
        if: success() && hashFiles('output/**') != ''

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: posted-log
          path: posted_log.json
        if: success() && hashFiles('posted_log.json') != ''
