name: Auto Clip Generator

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy   # directly install moviepy (only needed for test)

      - name: Run clip generator
        run: python main.py

      - name: Upload generated video
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
        if: success() && hashFiles('output/**') != ''

      - name: Upload log file
        uses: actions/upload-artifact@v4
        with:
          name: posted-log
          path: posted_log.json
        if: success() && hashFiles('posted_log.json') != ''
